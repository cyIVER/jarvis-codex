services:
  remotion-render:
    build:
      context: .
    volumes:
      - ./out:/workspace/video/remotion/out
    command: npm run render

  remotion-render-gpu:
    build:
      context: .
    volumes:
      - ./out:/workspace/video/remotion/out
    # Docker Desktop GPU access depends on host OS, drivers, WSL2 integration, and
    # container runtime support. This profile keeps GPU rendering opt-in.
    profiles: ["gpu"]
    command: npm run render:gpu
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

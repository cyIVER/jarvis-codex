schema_version: 1
loop_type: optimization_discovery
name: Hardware Optimization Loop
status: planning_only
description: >
  A planning-only design for evaluating hardware backends (NPU/CUDA/Docker)
  under explicit approval gates. This plan does not authorize autonomous
  workload execution, benchmark writes, code patches, or documentation updates.

trigger:
  - state: New hardware adapter detected OR performance degradation observed.
  - condition: User has explicitly approved planning this hardware evaluation.

safety:
  planning_only: true
  preflight_log_is_not_execution_permission: true
  requires_explicit_approval_before_workload: true
  requires_explicit_approval_before_benchmark_write: true
  requires_explicit_approval_before_patch: true
  requires_explicit_approval_before_doc_update: true
  disallowed_without_approval:
    - local ML execution
    - GPU workload execution
    - Docker execution
    - service or daemon launch
    - benchmark file writes
    - code patches
    - documentation updates
    - git or Worktrunk mutation

cycle:
  1_preflight_check:
    action: Propose running the hardware preflight for a named workload.
    gate: gate-hardware-approved
    notes:
      - "`preflight_check()` and `state/logs/hardware_gate_checks.jsonl` document a decision only."
      - A passing or approved preflight entry is not permission to execute the workload.
    
  2_protocol_lock:
    action: Draft a proxy metric and protocol for review.
    gate: explicit-user-approval-before-writing-protocol
    
  3_experiment_proposal:
    action: Propose the exact workload command, input paths, model paths, expected writes, and rollback/inspection steps.
    gate: explicit-user-approval-before-runtime-execution
    
  4_measurement_proposal:
    action: Propose the benchmark output path and metrics schema.
    gate: explicit-user-approval-before-benchmark-write
    
  5_synthesize:
    action: Summarize whether backend recommendations in `hardware.py` may need adjustment.
    gate: explicit-user-approval-before-patches-or-doc-updates

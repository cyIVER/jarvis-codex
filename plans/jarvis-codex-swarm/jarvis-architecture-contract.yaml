schema_version: 1
artifact: pm_architecture_contract
orchestrator: Product Delivery Orchestrator
project: Jarvis Codex
goal: Local-first AI project management and operational intelligence for software delivery.
status: planning_contract
execution_authority: false

planes:
  - name: Review Plane
    responsibility: local-first plan inspection and status review
    component: plan_viewer.py
    acceptance:
      - Viewer runs locally on 127.0.0.1 without external network calls.
      - Next steps selection persists to a local planning queue.
      - Displays state continuity card.
  - name: Planning Plane
    responsibility: structured next-step selection and queue management
    component: plan_viewer.py
    acceptance:
      - Queue entries are planning state and are not execution authority.
      - Queued state is bundled with source and timestamp.
  - name: Execution Plane
    responsibility: hardware-aware, approval-gated task proposals
    component: hardware.py, lanes.py
    acceptance:
      - Canonical preflight checks enforce hardware and execution approvals.
      - Lane mutations require explicit command approval before action.
      - Cross-lane decisions feed into worker contract with labels (ready/needs-review/blocked).
  - name: State Plane
    responsibility: durable session continuity and cross-session memory
    component: state.py
    acceptance:
      - Git-friendly state placeholders.
      - Append-only structured logs.
      - Clear separation of memory, episodes, handoffs, and approvals.

gates:
  - name: gate-brief-approved
    policy: Require user approval of next-steps brief.
  - name: gate-hardware-approved
    policy: Require user-signed state flag before heavy local runs (CUDA/NPU/Docker).
  - name: gate-lane-mutation
    policy: Require explicit command and 'ready for action' acceptance before branching/merging.
  - name: gate-handoff-generated
    policy: Handoffs must be pure markdown artifacts and read-only context.

worktrunk_lanes:
  - name: main
    purpose: stable integration and releases
    status: current registered worktree

stale_lane_history:
  - name: lane/codex-bridge
    purpose: tool and execution integration
    status: planning history only until confirmed by git worktree list
  - name: lane/memory-state
    purpose: session state features
    status: planning history only until confirmed by git worktree list
  - name: lane/verification-eval
    purpose: testing and QA
    status: planning history only until confirmed by git worktree list
  - name: lane/visual-plan-ui
    purpose: plan viewer UI updates
    status: planning history only until confirmed by git worktree list
  - name: lane/voice-ingress
    purpose: speech notifications and hooks
    status: planning history only until confirmed by git worktree list

worker_contract_template: |
  schema_version: 1
  artifact: worker_contract
  mutation_performed: false
  execution_authority: false
  action: {hold|refresh|abandon}
  lane: {branch_name}
  base_commit: {sha}
  timestamp: {epoch}
  decision: {ready|needs-review|blocked}
  evidence: {status}
  merge_recommendation: {recommendation}

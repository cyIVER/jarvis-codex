patterns:
  - id: product-readiness-triage
    name: Product Readiness Triage
    level: L1
    cadence: manual
    owner: main-codex
    state: STATE.md
    run_log: loop-run-log.md
    budget: loop-budget.md
    safety: docs/safety.md
    backlog: docs/PRODUCT_READINESS.md
    description: >
      Report-first loop for selecting, implementing, validating, and committing
      bounded Jarvis Codex product-readiness slices without weakening approval
      gates or introducing unattended runtime execution.
    allowed_actions:
      - read repo files
      - run validators
      - run tests
      - implement bounded package slices
      - commit validated scoped changes with exact-path staging
    denied_actions:
      - git push
      - destructive git mutation
      - Worktrunk mutation
      - service launch
      - Docker workload
      - local ML workload
      - unattended command execution

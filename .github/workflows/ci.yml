name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install Playwright Chromium
        run: uv run python -m playwright install --with-deps chromium

      - name: Run Python tests
        run: uv run pytest

      - name: Validate project-local Codex governance
        run: python3 scripts/validate-jarvis-codex-phase1.py

  remotion:
    name: Remotion static validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video/remotion
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video/remotion/package-lock.json

      - name: Install Remotion dependencies
        run: npm ci

      - name: Typecheck Remotion review assets
        run: npm run typecheck

      - name: Audit Remotion dependencies
        run: npm audit --audit-level=high

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jarvis Codex Plan Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Plan files">
        <div class="brand-block">
          <p class="label">Jarvis Codex</p>
          <h1>Plan Review</h1>
        </div>
        <div class="toolbar">
          <label for="plan-search">Filter plans</label>
          <input id="plan-search" type="search" autocomplete="off" />
        </div>
        <nav id="plan-list" class="plan-list" aria-live="polite"></nav>
        <div id="source-meta" class="source-meta"></div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="label">Local browser surface</p>
            <h2 id="active-title">Loading plans</h2>
          </div>
          <div class="actions">
            <button id="refresh-button" type="button">Refresh</button>
            <button id="copy-link-button" type="button">Copy Link</button>
          </div>
        </header>

        <section class="review-grid">
          <article class="document-pane" aria-label="Rendered plan">
            <div id="document-status" class="state-message">Loading local plan files.</div>
            <div id="document" class="document"></div>
          </article>
          <aside class="outline-pane" aria-label="Plan outline">
            <div class="summary-strip">
              <div>
                <span id="heading-count">0</span>
                <p>Headings</p>
              </div>
              <div>
                <span id="code-count">0</span>
                <p>Code Blocks</p>
              </div>
            </div>
            <div>
              <h3>Outline</h3>
              <ol id="outline-list" class="outline-list"></ol>
            </div>
          </aside>
        </section>
      </main>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
